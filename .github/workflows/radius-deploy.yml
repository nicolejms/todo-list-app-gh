name: Deploy Radius Application
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Radius environment name'
        required: true
        default: 'production'
  workflow_run:
    workflows: ["Radius - Verify Credentials"]
    types: [completed]

permissions:
  id-token: write
  contents: write

env:
  RESOURCE_TYPES_CONTRIB_REF: main
  RADIUS_ENV: ${{ inputs.environment || 'production' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: 'v0.1.4'

      - name: Get AKS Credentials
        run: |
          az aks get-credentials --name "${{ vars.RADIUS_K8S_CLUSTER }}" --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" --overwrite-existing
          kubelogin convert-kubeconfig -l azurecli

      - name: Install Radius CLI
        run: |
          wget -q "https://raw.githubusercontent.com/radius-project/radius/main/deploy/install.sh" -O - | /bin/bash

      - name: Install Radius on target cluster
        run: |
          rad install kubernetes --set rp.publicEndpointOverride=localhost

      - name: Configure Radius environment
        run: |
          rad workspace create kubernetes default
          rad group create default
          rad group switch default
          rad env create "${{ env.RADIUS_ENV }}" --namespace "${{ env.RADIUS_ENV }}"
          rad env switch "${{ env.RADIUS_ENV }}"
          rad credential register azure sp --client-id "${{ secrets.AZURE_CLIENT_ID }}" --client-secret "${{ secrets.RADIUS_CLIENT_SECRET }}" --tenant-id "${{ secrets.AZURE_TENANT_ID }}"
          rad env update "${{ env.RADIUS_ENV }}" --azure-subscription-id "${{ secrets.AZURE_SUBSCRIPTION_ID }}" --azure-resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"

      - name: Register resource types and recipes
        run: |
          # Register local-dev recipes for built-in Radius types
          rad recipe register default --resource-type "Applications.Datastores/sqlDatabases" --template-kind "bicep" --template-path "ghcr.io/radius-project/recipes/local-dev/sqldatabases:latest" --environment "${{ env.RADIUS_ENV }}" 2>/dev/null || true
          rad recipe register default --resource-type "Applications.Datastores/redisCaches" --template-kind "bicep" --template-path "ghcr.io/radius-project/recipes/local-dev/rediscaches:latest" --environment "${{ env.RADIUS_ENV }}" 2>/dev/null || true
          rad recipe register default --resource-type "Applications.Datastores/mongoDatabases" --template-kind "bicep" --template-path "ghcr.io/radius-project/recipes/local-dev/mongodatabases:latest" --environment "${{ env.RADIUS_ENV }}" 2>/dev/null || true
          rad recipe register default --resource-type "Applications.Messaging/rabbitMQQueues" --template-kind "bicep" --template-path "ghcr.io/radius-project/recipes/local-dev/rabbitmqqueues:latest" --environment "${{ env.RADIUS_ENV }}" 2>/dev/null || true
          # Register extensibility resource types and recipes
          git clone --depth 1 --branch ${{ env.RESOURCE_TYPES_CONTRIB_REF }} https://github.com/radius-project/resource-types-contrib.git /tmp/resource-types-contrib
          for type_dir in /tmp/resource-types-contrib/*/; do
            type_name=$(basename "$type_dir")
            if [ -f "$type_dir/resourceType.yaml" ]; then
              rad resource-type register "$type_name" --from-file "$type_dir/resourceType.yaml" 2>/dev/null || true
            fi
          done
          for recipe_dir in /tmp/resource-types-contrib/*/recipes/azure/terraform; do
            if [ -d "$recipe_dir" ]; then
              type_name=$(echo "$recipe_dir" | sed 's|.*/resource-types-contrib/\([^/]*\)/.*|\1|')
              rad recipe register default --resource-type "$type_name" --template-kind terraform --template-path "$recipe_dir" 2>/dev/null || true
            fi
          done
          echo " Resource types and recipes registered"

      - name: Deploy Application
        run: |
          if [ -f ".radius/app.bicep" ]; then
            rad deploy ".radius/app.bicep" --environment "${{ env.RADIUS_ENV }}" --application "${{ env.RADIUS_ENV }}"
          elif [ -f "app.bicep" ]; then
            rad deploy "app.bicep" --environment "${{ env.RADIUS_ENV }}" --application "${{ env.RADIUS_ENV }}"
          else
            echo " No app.bicep found in repository"
            exit 1
          fi

      - name: Show Application Status
        run: |
          APP_NAME=$(rad app list -o json | jq -r '.[0].name // empty')
          if [ -n "$APP_NAME" ]; then
            rad app status -a "$APP_NAME"
            rad app graph -a "$APP_NAME" 2>/dev/null || true
          else
            echo "No application found after deploy"
          fi
        continue-on-error: true

      - name: Build App Graph
        run: |
          APP_NAME=$(rad app list -o json | jq -r '.[0].name // empty')
          if [ -n "$APP_NAME" ]; then
            rad app graph -a "$APP_NAME" -o json > /tmp/app-graph.json
            echo "App graph saved"
          fi
        continue-on-error: true