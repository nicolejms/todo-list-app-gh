name: Deploy Radius Application
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Radius environment name'
        required: true
        default: 'dev'

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up kubelogin
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: 'v0.1.4'

      - name: Get AKS Credentials
        run: |
          az aks get-credentials --name "${{ vars.RADIUS_K8S_CLUSTER }}" --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" --overwrite-existing
          kubelogin convert-kubeconfig -l azurecli

      - name: Install Radius CLI
        run: |
          wget -q "https://raw.githubusercontent.com/radius-project/radius/main/deploy/install.sh" -O - | /bin/bash

      - name: Install Radius Control Plane
        run: |
          rad install kubernetes --set rp.publicEndpointOverride=localhost || echo "Radius already installed"

      - name: Setup Radius Environment
        run: |
          rad workspace create kubernetes default
          rad group create default
          rad group switch default
          rad env create "${{ inputs.environment }}" --namespace "default" || echo "Environment already exists"
          rad env switch "${{ inputs.environment }}"
          rad credential register azure wi --client-id "${{ secrets.AZURE_CLIENT_ID }}" --tenant-id "${{ secrets.AZURE_TENANT_ID }}"
          rad env update "${{ inputs.environment }}" --azure-subscription-id "${{ secrets.AZURE_SUBSCRIPTION_ID }}" --azure-resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"

      - name: Deploy Application
        run: |
          if [ -f ".radius/app.bicep" ]; then
            rad deploy ".radius/app.bicep" --environment "${{ inputs.environment }}" --application "${{ inputs.environment }}"
          elif [ -f "app.bicep" ]; then
            rad deploy "app.bicep" --environment "${{ inputs.environment }}" --application "${{ inputs.environment }}"
          else
            echo "No app.bicep found"
            exit 1
          fi

      - name: Show Application Status
        run: |
          rad resource list --output table || true