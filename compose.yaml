services:
  app:
    image: node:22-alpine
    command: sh -c "yarn install && yarn run dev"
    ports:
      - 127.0.0.1:3000:3000
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      PG_HOST: postgres
      PG_USER: postgres
      PG_PASSWORD: secret
      PG_DB: todos

  postgres:
    image: postgres:16-alpine
    volumes:
      - todo-pg-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: todos

volumes:
  todo-pg-data:
